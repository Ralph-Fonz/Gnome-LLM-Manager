<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Brain/circuit symbolic icon for LLM Manager -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Brain outline -->
    <path d="M8 2 C5.5 2 3.5 3.5 3.5 5.5 C3.5 6.5 4 7.3 4 8 C4 9 3 10 3 11.5 C3 13 4.5 14 6 14 C7 14 7.5 13.5 8 13"/>
    <path d="M8 2 C10.5 2 12.5 3.5 12.5 5.5 C12.5 6.5 12 7.3 12 8 C12 9 13 10 13 11.5 C13 13 11.5 14 10 14 C9 14 8.5 13.5 8 13"/>
    <!-- Center line -->
    <line x1="8" y1="2" x2="8" y2="13"/>
    <!-- Neural nodes -->
    <circle cx="6" cy="6" r="0.7" fill="currentColor"/>
    <circle cx="10" cy="6" r="0.7" fill="currentColor"/>
    <circle cx="6" cy="10" r="0.7" fill="currentColor"/>
    <circle cx="10" cy="10" r="0.7" fill="currentColor"/>
    <circle cx="8" cy="8" r="0.7" fill="currentColor"/>
    <!-- Connections -->
    <line x1="6" y1="6" x2="8" y2="8"/>
    <line x1="10" y1="6" x2="8" y2="8"/>
    <line x1="6" y1="10" x2="8" y2="8"/>
    <line x1="10" y1="10" x2="8" y2="8"/>
  </g>
</svg>
